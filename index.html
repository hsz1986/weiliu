    20|  /* ===== Gradient Blobs (Background) ===== */
    21|  .blob-container{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
    22|  .blob{
    23|    position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;
    24|    animation:blobFloat 20s ease-in-out infinite;
    25|  }
    26|  .blob-1{width:600px;height:600px;background:#0071e3;top:-200px;left:-100px;animation-delay:0s}
    27|  .blob-2{width:500px;height:500px;background:#5856d6;top:40%;right:-150px;animation-delay:-7s}
    28|  .blob-3{width:400px;height:400px;background:#34c759;bottom:-100px;left:30%;animation-delay:-14s}
    29|  @keyframes blobFloat{
    30|    0%,100%{transform:translate(0,0) scale(1)}
    31|    25%{transform:translate(30px,-40px) scale(1.05)}
    32|    50%{transform:translate(-20px,30px) scale(0.95)}
    33|    75%{transform:translate(40px,20px) scale(1.03)}
    34|  }
    35|
    36|  /* ===== Cursor Glow ===== */
    37|  .cursor-glow{
    38|    position:fixed;width:400px;height:400px;border-radius:50%;
    39|    background:radial-gradient(circle,rgba(0,113,227,0.06) 0%,transparent 70%);
    40|    pointer-events:none;z-index:0;
    41|    transform:translate(-50%,-50%);
    42|    transition:opacity .3s;
    43|  }

    45|  /* ===== Nav ===== */

    48|    background:rgba(255,255,255,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
    49|    border-bottom:1px solid rgba(0,0,0,0.06);
    50|    padding:0 48px;height:52px;
    51|    display:flex;align-items:center;justify-content:space-between;
    52|    transition:all .4s;
    53|  }
    54|  .nav.scrolled{background:rgba(255,255,255,0.92);box-shadow:0 1px 12px rgba(0,0,0,0.06)}
    55|  .nav-brand{font-weight:700;font-size:15px;color:#1d1d1f;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
    56|  .nav-brand .logo{

    58|    border-radius:7px;display:flex;align-items:center;justify-content:center;

    65|  .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;background:#0071e3;transition:width .3s}
    66|  .nav-links a:hover{color:#1d1d1f}
    67|  .nav-links a:hover::after{width:100%}
    68|  .nav-download{
    69|    background:#0071e3;color:#fff!important;
    70|    padding:7px 18px;border-radius:20px;font-size:12px!important;font-weight:600;
    71|    transition:all .3s;overflow:hidden;position:relative;
    72|  }

    74|    content:'';position:absolute;top:50%;left:50%;width:0;height:0;
    75|    background:rgba(255,255,255,0.2);border-radius:50%;

    77|  }
    78|  .nav-download:hover::before{width:200px;height:200px}
    79|  .nav-download:hover{background:#0077ed;transform:scale(1.04)}

    81|  /* ===== Hero ===== */

   398|  /* ===== How to Get ===== */
   399|  .get-steps{max-width:560px;margin:0 auto}
   400|  .get-item{
   401|    display:flex;gap:20px;align-items:flex-start;
   402|    padding:20px 0;border-bottom:1px solid #e8e8ed;
   403|    transition:all .3s;
   404|  }
   405|  .get-item:hover{padding-left:8px}
   406|  .get-item:last-child{border:none}
   407|  .get-num{
   408|    flex-shrink:0;width:38px;height:38px;
   409|    background:linear-gradient(135deg,#0071e3,#5856d6);color:#fff;border-radius:50%;
   410|    display:flex;align-items:center;justify-content:center;
   411|    font-size:16px;font-weight:700;
   412|    transition:all .3s;box-shadow:0 4px 12px rgba(0,113,227,0.2);
   413|  }
   414|  .get-item:hover .get-num{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,113,227,0.35)}
   415|  .get-text h4{font-size:16px;font-weight:600;margin-bottom:4px}
   416|  .get-text p{font-size:14px;color:#86868b;line-height:1.6}

   418|  /* ===== CTA ===== */
   419|  .cta-card{
   420|    background:#fff;margin:60px 40px;border-radius:40px;padding:80px 40px;
   421|    text-align:center;max-width:1020px;margin-left:auto;margin-right:auto;
   422|    box-shadow:0 4px 20px rgba(0,0,0,0.04);
   423|    position:relative;overflow:hidden;
   424|  }
   425|  .cta-card::before{
   426|    content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
   427|    background:radial-gradient(circle at 30% 50%,rgba(0,113,227,0.04) 0%,transparent 50%);
   428|    animation:ctaGlow 8s ease-in-out infinite;
   429|  }
   430|  @keyframes ctaGlow{0%,100%{transform:translate(0,0)}50%{transform:translate(5%,3%)}}
   431|  .cta-card h2{font-size:40px;font-weight:700;margin-bottom:14px;letter-spacing:-0.3px;position:relative}
   432|  .cta-card p{font-size:17px;color:#86868b;margin-bottom:36px;line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto;position:relative}

   434|  /* ===== Modal ===== */
   435|  .modal-overlay{
   436|    display:none;position:fixed;inset:0;z-index:999;
   437|    background:rgba(0,0,0,0.48);
   438|    align-items:center;justify-content:center;
   439|    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
   440|    opacity:0;transition:opacity .3s;
   441|  }
   442|  .modal-overlay.active{display:flex;opacity:1}
   443|  .modal{
   444|    background:#fff;border-radius:28px;padding:44px 36px;
   445|    max-width:400px;width:90%;
   446|    text-align:center;box-shadow:0 40px 100px rgba(0,0,0,0.25);
   447|    animation:modalIn .4s cubic-bezier(0.34,1.56,0.64,1);
   448|    position:relative;
   449|  }
   450|  @keyframes modalIn{from{transform:scale(0.8) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
   451|  .modal-close-btn{
   452|    position:absolute;top:16px;right:16px;
   453|    width:30px;height:30px;border-radius:50%;
   454|    background:#f5f5f7;border:none;font-size:14px;color:#86868b;
   455|    cursor:pointer;display:flex;align-items:center;justify-content:center;
   456|    transition:all .2s;
   457|  }
   458|  .modal-close-btn:hover{background:#e8e8ed;color:#1d1d1f;transform:rotate(90deg)}
   459|  .modal h3{font-size:22px;font-weight:700;margin-bottom:8px}
   460|  .modal>p{font-size:14px;color:#86868b;margin-bottom:24px;line-height:1.6}
   461|  .modal-qr{
   462|    width:280px;height:280px;margin:0 auto 20px;
   463|    background:#f5f5f7;border-radius:16px;
   464|    display:flex;align-items:center;justify-content:center;
   465|    font-size:12px;color:#86868b;overflow:hidden;
   466|    border:1px solid rgba(0,0,0,0.04);
   467|    transition:transform .3s;
   468|  }
   469|  .modal-qr:hover{transform:scale(1.03)}
   470|  .modal-qr img{width:100%;height:100%;object-fit:cover}
   471|  .modal-steps{text-align:left;max-width:280px;margin:0 auto}
   472|  .modal-steps .step{
   473|    font-size:14px;color:#424245;line-height:2.2;
   474|    display:flex;align-items:center;gap:10px;
   475|  }
   476|  .modal-steps .step .num{
   477|    width:24px;height:24px;border-radius:50%;
   478|    background:linear-gradient(135deg,rgba(0,113,227,0.1),rgba(88,86,214,0.1));
   479|    color:#0071e3;font-size:11px;font-weight:700;
   480|    display:flex;align-items:center;justify-content:center;flex-shrink:0;
   481|  }
   482|  .modal-divider{height:1px;background:#e8e8ed;margin:20px 0}
   483|  .modal-footer{font-size:12px;color:#aeaeb2}
   484|
   485|  /* ===== Marquee ===== */
   486|  .marquee-container{
   487|    overflow:hidden;padding:24px 0;
   488|    border-top:1px solid #e8e8ed;border-bottom:1px solid #e8e8ed;
   489|    margin:0 -40px;
   490|  }
   491|  .marquee-track{
   492|    display:flex;gap:48px;animation:marquee 30s linear infinite;
   493|    white-space:nowrap;
   494|  }
   495|  .marquee-item{
   496|    font-size:15px;font-weight:600;color:#d1d1d6;
   497|    display:flex;align-items:center;gap:8px;flex-shrink:0;
   498|  }
   499|  .marquee-item .sep{color:#0071e3;font-size:10px}
   500|  @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
